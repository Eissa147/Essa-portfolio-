<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width,initialscale=1.0">
  <link rel="stylesheet" href="index4.css">
  <title>Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f6fc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }


    form {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      width: 400px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
    }


    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"],
    input[type="number"],
    input[type="date"],
    input[type="file"],
    input[type="search"],
    input[type="url"],
    input[type="time"],
    input[type="range"],
    input[type="color"] {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      transition: 0.3s;
    }

    input:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 5px rgba(74, 144, 226, 0.5);
      outline: none;
    }


    input[type="radio"],
    input[type="checkbox"] {
      margin-right: 8px;
      transform: scale(1.2);
    }


    input[type="submit"],
    input[type="reset"] {
      width: 48%;
      padding: 10px;
      margin-top: 10px;
      margin-right: 2%;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    input[type="submit"] {
      background: #4a90e2;
      color: #fff;
    }

    input[type="submit"]:hover {
      background: #357ab8;
    }

    input[type="reset"] {
      background: #e74c3c;
      color: #fff;
    }

    input[type="reset"]:hover {
      background: #c0392b;
    }


    .inline-inputs {
      margin-bottom: 15px;
    }

    .inline-inputs label {
      display: inline-block;
      margin-right: 15px;
      font-weight: normal;
    }
  </style>
  <link rel="icon" type="image/jpeg" href="1ef01e2a-3480-4f79-9c3f-9d6d86d0dc4a.jfif">
</head>

<body>
  <form>

    <label for="nam">Full Name:</label>
    <input type="text" id="nam" placeholder="Enter your name">

    <label for="eml">Email:</label>
    <input type="email" id="eml" placeholder="Enter your email">

    <label for="pas">Password:</label>
    <input type="password" id="pas" placeholder="Enter password">

    <label for="ph">Phone Number:</label>
    <input type="tel" id="ph" placeholder="Phone number">

    <label for="ag">Age:</label>
    <input type="number" id="ag">

    <label for="da">Date of Birth:</label>
    <input type="date" id="da">

    <label for="up">Upload Photo:</label>
    <input type="file" id="up">

    <label>Gender:</label>
    <div class="inline-inputs">
      <label><input type="radio" name="gender"> Male</label>
      <label><input type="radio" name="gender"> Female</label>
    </div>

    <label>Choose The Best Prodects:</label>
    <div class="inline-inputs">
      <label><input type="checkbox"> Health and Wellness</label>
      <label><input type="checkbox">Cosmetics</label>
      <label><input type="checkbox"> Computers and Tools</label>
    </div>

    <label for="fav">Favorite Color:</label>
    <input type="color" id="fav">

    <label for="ser"></label>
    <inpu

    <label for="we">Website:</label>
    <input type="url" id="we" placeholder="https://example.com">

    <input type="submit" value="Register">
    <input type="reset" value="Clear Form">

  </form>

</body>

</html>
